<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Google</title>
    <link
      rel="icon"
      href="/googlehomepageclone/favicon.ico"
      type="image/x-icon"
    />
    <link href="newgoogle.css" rel="stylesheet" />
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />
  </head>
  <body>
    <nav>
      <a href="#">Gmail</a>
      <a href="#">Images</a>
      <img class="nav-image nav-app" src="apps.svg" alt="apps" />
      <button class="sign-in-btn">Sign in</button>
    </nav>
    <section>
      <img class="google" src="googlecolor.png" />
      <div class="search-box">
        <label for="search">
          <img class="search-img" src="search.svg" />
        </label>
        <input type="search" id="search" autofocus />
        <img class="mic-img" src="mic.svg" />

        <div class="buttons">
          <button>Google Search</button>
          <button>I'm Feeling Lucky</button>
        </div>

        <div class="language-bar">
          <p>Google offered in :</p>
          <a href="#">हिन्दी</a>
          <a href="#">বাংলা</a>
          <a href="#">తెలుగు</a>
          <a href="#">मराठी</a>
          <a href="#">தமிழ்</a>
          <a href="#">ગુજરાતી</a>
          <a href="#">ಕನ್ನಡ</a>
          <a href="#">മലയാളം</a>
          <a href="#">ਪੰਜਾਬੀ</a>
        </div>
      </div>
    </section>
    <footer>
      <div class="country">
        <p>India</p>
      </div>
      <hr />
      <div class="misc">
        <div class="about">
          <a href="#">About</a>
          <a href="#">Advertising</a>
          <a href="#">Business</a>
          <a href="#">How Search works</a>
        </div>
        <div class="info">
          <a href="#">Privacy</a>
          <a href="#">Terms</a>
          <a href="#">Settings</a>
        </div>
      </div>
    </footer>
  </body>
</html>
